version: 1
linear:
  enabled: false
  apiKeyEnv: LINEAR_API_KEY
  teamId: ENG
  projectId:
  createIssueOnStart: false
  commentOnProgress: false
  commentOnCompletion: false
  defaultStateIds:
    started:
    completed:
    failed:
agent:
  mode: bounded-runner
  temperature: 0.1
  allowPromptNormalization: true
  allowIntentPlanning: true
  fallbackToRules: true
sources:
  demo-catalog:
    aliases:
      - demo
      - demo-app
      - demo-catalog
    planning:
      repoId: intent-poc
      repoLabel: Intent POC
      role: controller-and-demo-source
      summary: Current workspace used to bootstrap resumable IDD planning and demo evidence flows.
      notes:
        - Use this repo as the first concrete repo-context example while agent access is pending.
    studio:
      displayName: Current app
    testing:
      playwright:
        enabled: true
    source:
      type: local
      localPath: .
    workspace:
      checkoutMode: existing
      installTimeoutMs: 600000
      env: {}
    app:
      workdir: .
      startCommand: npm run demo:serve -- --port 6006
      baseUrl: http://127.0.0.1:6006
      startTimeoutMs: 120000
      env: {}
      readiness:
        type: http
        url: http://127.0.0.1:6006/health
        expectedStatus: 200
        timeoutMs: 120000
        intervalMs: 500
    capture:
      waitAfterLoadMs: 300
      injectCss:
        - "*, *::before, *::after { animation: none !important; transition: none !important; caret-color: transparent !important; }"
      defaultFullPage: true
      items:
        - id: library-index
          name: Demo Catalog Index
          path: /library
          fullPage: true
        - id: component-button-primary
          name: Demo Primary Button
          path: /library/component-button-primary
          locator: "[data-testid='component-button-primary']"
          waitForSelector: "[data-testid='component-button-primary']"
        - id: page-analytics-overview
          name: Demo Analytics Overview
          path: /library/page-analytics-overview
          fullPage: true
  demo-components:
    aliases:
      - demo-components
      - components
      - surface-catalog
    planning:
      repoId: intent-poc
      repoLabel: Intent POC Demo Components
      role: tracked demo screenshot source
      summary: Built-in demo surface catalog used to regenerate tracked screenshots through the shared runner path.
      notes:
        - Use this source for tracked screenshot refreshes under evidence/baselines/demo-components.
        - Keep demo screenshot regeneration on runIntent rather than adding a parallel capture implementation.
    studio:
      displayName: Demo components
    testing:
      playwright:
        enabled: false
    source:
      type: local
      localPath: .
    workspace:
      checkoutMode: existing
      installTimeoutMs: 600000
      env: {}
    app:
      workdir: .
      startCommand: npm run demo:serve -- --port 6006
      baseUrl: http://127.0.0.1:6006
      startTimeoutMs: 120000
      env: {}
      readiness:
        type: http
        url: http://127.0.0.1:6006/health
        expectedStatus: 200
        timeoutMs: 120000
        intervalMs: 500
    capture:
      catalog: demo-surface-catalog
      trackedRoot: ./evidence/baselines/demo-components
      waitAfterLoadMs: 300
      injectCss:
        - "*, *::before, *::after { animation: none !important; transition: none !important; caret-color: transparent !important; }"
      defaultFullPage: false
      items: []
playwright:
  browser: chromium
  headless: true
  viewport:
    width: 1440
    height: 900
  deviceScaleFactor: 1
  locale: en-US
  timezoneId: UTC
  colorScheme: light
  disableAnimations: true
artifacts:
  storageMode: controller
  runRoot: ./artifacts/runs
  libraryRoot: ./artifacts/library
  baselineRoot: ./evidence/baselines
  copyToSourcePath: .intent-poc/artifacts
  writeMarkdownSummary: true
  writeJsonSummary: true
  retainRuns: 20
  cleanBeforeRun: false
comparison:
  enabled: true
  hashAlgorithm: sha256
  diffMethod: pixelmatch
  pixelThreshold: 0.01
  failOnChange: false
  onMissingBaseline: error
  writeDiffImages: true
run:
  sourceId: demo-catalog
  mode: baseline
  intent: Create a baseline screenshot library for the built-in demo catalog.
  resumeIssue:
  trackedBaseline: false
  captureIds: []
  continueOnCaptureError: false
  allowBaselinePromotion: false
  metadata: {}
  dryRun: false