version: 1
linear:
  enabled: false
  apiKeyEnv: LINEAR_API_KEY
  teamId: ENG
  projectId:
  createIssueOnStart: false
  commentOnProgress: false
  commentOnCompletion: false
  defaultStateIds:
    started:
    completed:
    failed:
agent:
  mode: bounded-runner
  temperature: 0.1
  allowPromptNormalization: true
  allowLinearScoping: true
  allowBDDPlanning: true
  allowTDDPlanning: true
  allowImplementation: false
  allowQAVerification: false
  fallbackToRules: true
sources:
  intent-poc-app:
    aliases:
      - intent-poc-app
      - demo
      - demo-app
      - demo-catalog
      - demo-components
      - components
      - surface-catalog
    planning:
      repoId: intent-poc
      repoLabel: Intent POC
      role: controller-and-demo-source
      summary: Current workspace source for Intent Studio, demo evidence flows, and built-in demo surface screenshots.
      notes:
        - Use this source for prompt-planning, Studio changes, and built-in demo surface evidence.
        - Demo screenshot regeneration routes through this source with an explicit library publish opt-in.
      verificationNotes:
        - Stateful UI bugs should declare and verify the requested UI state before screenshot evidence is trusted.
        - Prefer reusable state activation contracts over prompt-specific routing or one-off checkpoint logic.
      uiStates:
        - id: theme-mode
          label: Theme mode
          description: The demo app supports light and dark theme states that materially change contrast, tokens, and screenshot evidence.
          activation:
            - type: ui-control
              target: "[data-testid='theme-toggle']"
              values:
                light: "false"
                dark: "true"
              notes:
                - The shared demo surfaces and Intent Studio expose a theme toggle that must be activated deliberately.
          verificationStrategies:
            - ui-interaction-playwright
          notes:
            - Verify the active theme state before trusting screenshot comparisons.
            - Until a stable route contract exists, do not assume a catalog URL alone implies dark mode.
    studio:
      displayName: Current app
    testing:
      playwright:
        enabled: true
        outputDir: tests/intent
    source:
      type: local
      localPath: .
    workspace:
      checkoutMode: existing
      installTimeoutMs: 600000
      env: {}
    app:
      workdir: .
      startCommand: npm run demo:serve -- --port 6006
      baseUrl: http://127.0.0.1:6006
      reuseExistingServer: true
      startTimeoutMs: 120000
      env: {}
      readiness:
        type: http
        url: http://127.0.0.1:6006/health
        expectedStatus: 200
        timeoutMs: 120000
        intervalMs: 500
    capture:
      catalog: demo-surface-catalog
      publishToLibrary: false
      waitAfterLoadMs: 300
      injectCss:
        - "*, *::before, *::after { animation: none !important; transition: none !important; caret-color: transparent !important; }"
      defaultFullPage: false
      items:
        - id: library-index
          name: Demo Catalog Index
          path: /library
          fullPage: true
        - id: component-button-primary
          name: Demo Primary Button
          path: /library/component-button-primary
          locator: "[data-testid='component-button-primary']"
          waitForSelector: "[data-testid='component-button-primary']"
        - id: page-analytics-overview
          name: Demo Analytics Overview
          path: /library/page-analytics-overview
          fullPage: true
playwright:
  browser: chromium
  headless: true
  viewport:
    width: 1440
    height: 900
  deviceScaleFactor: 1
  locale: en-US
  timezoneId: UTC
  colorScheme: light
  disableAnimations: true
artifacts:
  storageMode: controller
  root: ./artifacts
  libraryRoot: ./artifacts/library
  copyToSourcePath: .intent-poc/artifacts
  writeMarkdownSummary: true
  writeJsonSummary: true
  cleanBeforeRun: true
comparison:
  enabled: true
  hashAlgorithm: sha256
  diffMethod: pixelmatch
  pixelThreshold: 0.01
  failOnChange: false
  onMissingBaseline: error
  writeDiffImages: true
run:
  sourceId: intent-poc-app
  intent: Capture the built-in demo catalog evidence and write reviewable artifacts.
  resumeIssue:
  captureIds: []
  continueOnCaptureError: false
  metadata: {}
  dryRun: false