version: 1
linear:
  enabled: false
  apiKeyEnv: LINEAR_API_KEY
  teamId: ENG
  projectId:
  createIssueOnStart: false
  commentOnProgress: false
  commentOnCompletion: false
  defaultStateIds:
    started:
    completed:
    failed:
agent:
  mode: bounded-runner
  provider: openai
  model: gpt-5.4
  temperature: 0.1
  allowPromptNormalization: true
  fallbackToRules: true
sources:
  demo-catalog:
    aliases:
      - demo
      - demo-app
      - demo-catalog
    planning:
      repoId: intent-poc
      repoLabel: Intent POC
      role: controller-and-demo-source
      summary: Current workspace used to bootstrap resumable IDD planning and demo evidence flows.
      notes:
        - Use this repo as the first concrete repo-context example while agent access is pending.
    source:
      type: local
      localPath: .
    workspace:
      checkoutMode: existing
      installTimeoutMs: 600000
      env: {}
    app:
      workdir: .
      startCommand: npm run demo:serve -- --port 6006
      baseUrl: http://127.0.0.1:6006
      startTimeoutMs: 120000
      env: {}
      readiness:
        type: http
        url: http://127.0.0.1:6006/health
        expectedStatus: 200
        timeoutMs: 120000
        intervalMs: 500
    capture:
      waitAfterLoadMs: 300
      injectCss:
        - "*, *::before, *::after { animation: none !important; transition: none !important; caret-color: transparent !important; }"
      defaultFullPage: true
      items:
        - id: library-index
          name: Demo Catalog Index
          path: /library
          fullPage: true
        - id: component-button-primary
          name: Demo Primary Button
          path: /library/component-button-primary
          locator: "[data-testid='component-button-primary']"
          waitForSelector: "[data-testid='component-button-primary']"
        - id: page-analytics-overview
          name: Demo Analytics Overview
          path: /library/page-analytics-overview
          fullPage: true
  client-systems-postgres:
    aliases:
      - client-systems
      - cs
      - postgres
      - pg
    planning:
      repoId: client-systems
      repoLabel: Client Systems
      role: external product repo
      summary: Git-backed product repo used for multi-repo planning and downstream implementation handoff.
    source:
      type: git
      gitUrl: https://github.com/geniusmonkey/client-systems.git
      ref: master
      authTokenEnv: CLIENT_SYSTEMS_GIT_TOKEN
    workspace:
      checkoutMode: clone-if-missing
      cloneRoot: ./.workdirs
      installTimeoutMs: 600000
      env: {}
    app:
      workdir: .
      startCommand: docker compose up -d postgres
      stopCommand: docker compose stop postgres
      baseUrl: http://127.0.0.1:6006
      startTimeoutMs: 120000
      env: {}
      readiness:
        type: http
        url: http://127.0.0.1:6006
        expectedStatus: 200
        timeoutMs: 180000
        intervalMs: 2000
    capture:
      waitAfterLoadMs: 700
      injectCss:
        - "*, *::before, *::after { animation: none !important; transition: none !important; caret-color: transparent !important; }"
      defaultFullPage: true
      items:
        - id: ui-overview
          name: UI Overview
          path: /
          fullPage: true
        - id: ui-primary-surface
          name: UI Primary Surface
          path: /iframe.html?id=button--primary
          fullPage: true
  example-storybook:
    aliases:
      - storybook
      - demo
    planning:
      repoId: target-app
      repoLabel: Example Storybook
      role: example target app
      summary: Local example repo kept for storybook-oriented capture and planning experiments.
    source:
      type: local
      localPath: ../target-app
    workspace:
      checkoutMode: existing
      installCommand: npm ci
      installTimeoutMs: 600000
      env: {}
    app:
      workdir: .
      startCommand: npm run storybook -- --port 6006 --ci
      baseUrl: http://127.0.0.1:6006
      startTimeoutMs: 120000
      env: {}
      readiness:
        type: http
        url: http://127.0.0.1:6006
        expectedStatus: 200
        timeoutMs: 120000
        intervalMs: 2000
    capture:
      waitAfterLoadMs: 700
      injectCss:
        - "*, *::before, *::after { animation: none !important; transition: none !important; caret-color: transparent !important; }"
      defaultFullPage: false
      items:
        - id: button-primary
          name: Primary Button
          path: /iframe.html?id=button--primary
          locator: "[data-testid='button-root']"
          waitForSelector: "[data-testid='button-root']"
        - id: card-default
          name: Default Card
          path: /iframe.html?id=card--default
          locator: "[data-testid='card-root']"
playwright:
  browser: chromium
  headless: true
  viewport:
    width: 1440
    height: 900
  deviceScaleFactor: 1
  locale: en-US
  timezoneId: UTC
  colorScheme: light
  disableAnimations: true
artifacts:
  storageMode: controller
  runRoot: ./artifacts/runs
  libraryRoot: ./artifacts/library
  baselineRoot: ./evidence/baselines
  copyToSourcePath: .intent-poc/artifacts
  writeMarkdownSummary: true
  writeJsonSummary: true
  retainRuns: 20
  cleanBeforeRun: false
comparison:
  enabled: true
  hashAlgorithm: sha256
  diffMethod: pixelmatch
  pixelThreshold: 0.01
  failOnChange: false
  onMissingBaseline: error
  writeDiffImages: true
run:
  sourceId: demo-catalog
  mode: baseline
  intent: Create a baseline screenshot library for the built-in demo catalog.
  resumeIssue:
  captureIds: []
  continueOnCaptureError: false
  allowBaselinePromotion: false
  metadata: {}
  dryRun: false