version: 1
linear:
  enabled: false
  apiKeyEnv: LINEAR_API_KEY
  teamId: ENG
  projectId:
  createIssueOnStart: false
  commentOnProgress: false
  commentOnCompletion: false
  defaultStateIds:
    started:
    completed:
    failed:
agent:
  mode: bounded-runner
  provider: gemini
  apiKeyEnv: GEMINI_KEY
  apiVersion: v1alpha
  temperature: 0.1
  requireAIWorkflow: true
  allowPromptNormalization: true
  allowLinearScoping: false
  allowBDDPlanning: true
  allowTDDPlanning: true
  allowImplementation: true
  allowQAVerification: true
  fallbackToRules: false
  stages:
    promptNormalization:
      model: models/gemini-3.1-flash-lite-preview
      modelFailover:
        - models/gemini-3-flash-preview
        - models/gemini-3.1-pro-preview
    linearScoping:
      model: models/gemini-3.1-flash-lite-preview
      modelFailover:
        - models/gemini-3-flash-preview
        - models/gemini-3.1-pro-preview
    bddPlanning:
      model: models/gemini-3.1-flash-lite-preview
      modelFailover:
        - models/gemini-3-flash-preview
        - models/gemini-3.1-pro-preview
    tddPlanning:
      model: models/gemini-3.1-flash-lite-preview
      modelFailover:
        - models/gemini-3-flash-preview
        - models/gemini-3.1-pro-preview
    implementation:
      model: models/gemini-3.1-flash-lite-preview
      modelFailover:
        - models/gemini-3-flash-preview
        - models/gemini-3.1-pro-preview
    qaVerification:
      model: models/gemini-3.1-flash-lite-preview
      modelFailover:
        - models/gemini-3-flash-preview
        - models/gemini-3.1-pro-preview
sources:
  intent-poc-app:
    aliases:
      - intent-poc-app
      - intent-studio
      - studio
      - surface library
      - surface-library
      - library
      - components
    planning:
      repoId: intent-poc
      repoLabel: Intent POC
      role: controller-and-demo-source
      summary: Current workspace source for Intent Studio, surface library evidence flows, and built-in surface library screenshots.
      notes:
        - Use this source for prompt-planning, Studio changes, and built-in surface library evidence.
        - Surface library screenshot regeneration routes through this source with an explicit library publish opt-in.
      verificationNotes:
        - Stateful UI bugs should declare and verify the requested UI state before screenshot evidence is trusted.
        - Prefer reusable state activation contracts over prompt-specific routing or one-off checkpoint logic.
        - Theme-sensitive UI bugs require paired light-mode and dark-mode screenshot evidence; do not accept a dark-mode-only capture set.
      uiStates:
        - id: theme-mode
          label: Theme mode
          description: The demo app supports light and dark theme states that materially change contrast, tokens, and screenshot evidence.
          activation:
            - type: query-param
              target: dark
              values:
                light: "false"
                dark: "true"
              notes:
                - The demo app now honors the dark query parameter across Studio and library routes for deterministic verification.
            - type: ui-control
              target: "[data-testid='theme-toggle']"
              values:
                light: "false"
                dark: "true"
              notes:
                - The library surface toggle remains available for manual verification flows.
            - type: ui-control
              target: "#dark-mode-toggle"
              values:
                light: "false"
                dark: "true"
              notes:
                - Intent Studio keeps an explicit toggle for interactive review during manual sessions.
          verificationStrategies:
            - ui-interaction-playwright
          notes:
            - Verify the active theme state before trusting screenshot comparisons.
            - Prefer the shared dark query parameter during generated verification so screenshots start in the requested theme.
            - Dark-theme verification should keep a light-mode reference screenshot alongside the dark-mode target evidence.
    studio:
      displayName: Current app
    testing:
      playwright:
        enabled: true
        outputDir: tests/intent
    source:
      type: local
      localPath: .
    workspace:
      checkoutMode: existing
      installTimeoutMs: 600000
      env: {}
    app:
      workdir: .
      startCommand: npm run demo:serve -- --port 6006
      baseUrl: http://127.0.0.1:6006
      reuseExistingServer: true
      startTimeoutMs: 120000
      env: {}
      readiness:
        type: http
        url: http://127.0.0.1:6006/health
        expectedStatus: 200
        timeoutMs: 120000
        intervalMs: 500
    capture:
      catalog: surface-library
      publishToLibrary: false
      waitAfterLoadMs: 300
      injectCss:
        - "*, *::before, *::after { animation: none !important; transition: none !important; caret-color: transparent !important; }"
      defaultFullPage: false
      items:
        - id: library-index
          name: Surface Library Index
          path: /library
          fullPage: true
        - id: component-button-primary
          name: Primary Button
          path: /library/component-button-primary
          locator: "[data-testid='component-button-primary']"
          waitForSelector: "[data-testid='component-button-primary']"
        - id: page-analytics-overview
          name: Analytics Overview
          path: /library/page-analytics-overview
          fullPage: true
playwright:
  browser: chromium
  headless: true
  viewport:
    width: 1440
    height: 900
  deviceScaleFactor: 1
  locale: en-US
  timezoneId: UTC
  colorScheme: light
  disableAnimations: true
artifacts:
  storageMode: controller
  root: ./artifacts
  libraryRoot: ./artifacts/library
  copyToSourcePath: .intent-poc/artifacts
  writeMarkdownSummary: true
  writeJsonSummary: true
  cleanBeforeRun: true
comparison:
  enabled: true
  hashAlgorithm: sha256
  diffMethod: pixelmatch
  pixelThreshold: 0.01
  failOnChange: false
  onMissingBaseline: error
  writeDiffImages: true
run:
  sourceId: intent-poc-app
  intent: Capture the built-in surface library evidence and write reviewable artifacts.
  resumeIssue:
  captureIds: []
  continueOnCaptureError: false
  metadata: {}
  dryRun: false