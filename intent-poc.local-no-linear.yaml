version: 1
linear:
  enabled: false
  apiKeyEnv: LINEAR_API_KEY
  teamId: ENG
  projectId: null
  createIssueOnStart: false
  commentOnProgress: false
  commentOnCompletion: false
  defaultStateIds:
    started: null
    completed: null
    failed: null
agent:
  mode: bounded-runner
  provider: gemini
  apiKeyEnv: GEMINI_KEY
  apiVersion: v1alpha
  temperature: 0.1
  allowPromptNormalization: true
  allowLinearScoping: true
  allowBDDPlanning: true
  allowTDDPlanning: true
  allowImplementation: true
  allowQAVerification: true
  fallbackToRules: true
  stages:
    promptNormalization:
      model: models/gemini-3.1-flash-lite-preview
    linearScoping:
      model: models/gemini-3.1-flash-lite-preview
    bddPlanning:
      model: models/gemini-3.1-flash-lite-preview
    tddPlanning:
      model: models/gemini-3.1-flash-lite-preview
    implementation:
      model: models/gemini-3.1-flash-lite-preview
    qaVerification:
      model: models/gemini-3.1-flash-lite-preview
sources:
  demo-catalog:
    aliases:
      - demo
      - demo-app
      - demo-catalog
    planning:
      repoId: intent-poc
      repoLabel: Intent Driven Development POC
      role: controller-and-demo-source
      summary: Current workspace used to exercise low-risk prompt normalization and demo evidence flows.
      notes:
        - Use this source for prompt-planning and dry-run validation inside the Intent Driven Development POC.
    studio:
      displayName: Current app
    source:
      type: local
      localPath: .
    workspace:
      checkoutMode: existing
      installTimeoutMs: 600000
      env: {}
    app:
      workdir: .
      startCommand: npm run demo:serve -- --port 6006
      baseUrl: http://127.0.0.1:6006
      startTimeoutMs: 120000
      env: {}
      readiness:
        type: http
        url: http://127.0.0.1:6006/health
        expectedStatus: 200
        timeoutMs: 120000
        intervalMs: 500
    capture:
      waitAfterLoadMs: 300
      injectCss:
        - "*, *::before, *::after { animation: none !important; transition: none !important; caret-color: transparent !important; }"
      defaultFullPage: true
      items:
        - id: library-index
          name: Demo Catalog Index
          path: /library
          fullPage: true
        - id: component-button-primary
          name: Demo Primary Button
          path: /library/component-button-primary
          locator: "[data-testid='component-button-primary']"
          waitForSelector: "[data-testid='component-button-primary']"
        - id: page-analytics-overview
          name: Demo Analytics Overview
          path: /library/page-analytics-overview
          fullPage: true
  demo-components:
    aliases:
      - demo-components
      - components
      - surface-catalog
    planning:
      repoId: intent-poc
      repoLabel: Intent Driven Development POC Demo Components
      role: tracked demo screenshot source
      summary: Built-in demo surface catalog used for low-risk screenshot regeneration through the shared runner path.
      notes:
        - Keep this source scoped to the built-in demo surfaces for the POC.
    studio:
      displayName: Demo components
    source:
      type: local
      localPath: .
    workspace:
      checkoutMode: existing
      installTimeoutMs: 600000
      env: {}
    app:
      workdir: .
      startCommand: npm run demo:serve -- --port 6006
      baseUrl: http://127.0.0.1:6006
      startTimeoutMs: 120000
      env: {}
      readiness:
        type: http
        url: http://127.0.0.1:6006/health
        expectedStatus: 200
        timeoutMs: 120000
        intervalMs: 500
    capture:
      catalog: demo-surface-catalog
      waitAfterLoadMs: 300
      injectCss:
        - "*, *::before, *::after { animation: none !important; transition: none !important; caret-color: transparent !important; }"
      defaultFullPage: false
      items: []
playwright:
  browser: chromium
  headless: true
  viewport:
    width: 1440
    height: 900
  deviceScaleFactor: 1
  locale: en-US
  timezoneId: UTC
  colorScheme: light
  disableAnimations: true
artifacts:
  storageMode: controller
  runRoot: ./artifacts/runs
  libraryRoot: ./artifacts/library
  baselineRoot: ./evidence/baselines
  copyToSourcePath: .intent-poc/artifacts
  writeMarkdownSummary: true
  writeJsonSummary: true
  retainRuns: 20
  cleanBeforeRun: false
comparison:
  enabled: true
  hashAlgorithm: sha256
  diffMethod: pixelmatch
  pixelThreshold: 0.01
  failOnChange: false
  onMissingBaseline: error
  writeDiffImages: true
run:
  sourceId: demo-catalog
  mode: compare
  intent: null
  captureIds: []
  continueOnCaptureError: false
  allowBaselinePromotion: false
  metadata: {}
  dryRun: false
